<!DOCTYPE html>
<html>
<head>
  <title>Election Dashboard</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>

<body>
  <h1>🗳 Election Dashboard</h1>

  <button onclick="addVote()">Add Vote</button>
  <button onclick="loadVotes()">Show Votes</button>
  <button onclick="loadStats()">Show Stats</button>
  <button onclick="clearVotes()">Clear All</button>

  <h2>Votes</h2>
  <pre id="votes"></pre>

  <h2>Region Stats</h2>
  <canvas id="chart" width="400" height="200"></canvas>

<script>
const API = "http://localhost:5000";

// Add vote
async function addVote() {
  const res = await fetch(API + "/vote", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({
      voterId: Math.floor(Math.random()*1000).toString(),
      candidate: "A",
      region: "Delhi"
    })
  });
  alert(await res.text());
}

// Show votes
async function loadVotes() {
  const res = await fetch(API + "/votes");
  const data = await res.json();
  document.getElementById("votes").innerText = JSON.stringify(data, null, 2);
}

// Show stats (chart)
async function loadStats() {
  const res = await fetch(API + "/stats");
  const data = await res.json();

  const labels = data.map(d => d._id);
  const counts = data.map(d => d.count);

  const ctx = document.getElementById("chart").getContext("2d");

  new Chart(ctx, {
    type: "bar",
    data: {
      labels: labels,
      datasets: [{
        label: "Votes",
        data: counts
      }]
    }
  });
}

// Clear votes
async function clearVotes() {
  const res = await fetch(API + "/clear");
  alert(await res.text());
}
</script>

</body>
</html>
